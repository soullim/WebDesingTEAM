<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹디자인팀 포털</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
@import url('https://cdn.jsdelivr.net/gh/toss/tossface/dist/tossface.css');
@font-face {
  font-family: 'Paperlogy';
  src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'Paperlogy';
  src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');
  font-weight: 600; font-style: normal;
}
@font-face {
  font-family: 'Paperlogy';
  src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
  font-weight: 800; font-style: normal;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Paperlogy', 'Noto Sans KR', sans-serif;
  /* 대시보드 */
  --accent: #6366F1; --accent-soft: #EEF2FF;
  --teal: #0F9B8E;
  --amber: #F59E0B; --amber-soft: #FFFBEB;
  --red: #EF4444; --red-soft: #FEF2F2;
  --green: #10B981; --green-soft: #ECFDF5;
  --blue: #3B82F6; --blue-soft: #EFF6FF;
  --border: #E2E8F0; --border2: #CBD5E1;
  --bg: #F8FAFC; --bg2: #F1F5F9;
  --text: #0F172A; --text2: #475569; --text3: #94A3B8;
  --white: #fff;
  /* 지식지갑 카테고리 */
  --col-figma: #3a7d44; --col-adobe: #b84c1a; --col-industry: #7b3fa0;
  --col-design: #1a5fa0; --col-trend: #a06020; --col-frontend: #1a7a7a; --col-ai: #c2185b;
  --bg-figma: rgba(58,125,68,.09); --bg-adobe: rgba(184,76,26,.09);
  --bg-industry: rgba(123,63,160,.09); --bg-design: rgba(26,95,160,.09);
  --bg-trend: rgba(160,96,32,.09); --bg-frontend: rgba(26,122,122,.09); --bg-ai: rgba(194,24,91,.09);
}

html, body {
  font-family: var(--font);
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

/* ═══ 네비 ═══ */
.g-nav {
  background: rgba(255,255,255,.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex; align-items: center; height: 56px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.g-logo {
  font-size: 17px; font-weight: 800;
  color: var(--accent); margin-right: 2rem;
  white-space: nowrap; letter-spacing: -.5px;
  text-decoration: none;
}
.g-logo span { color: var(--text); }
.g-tabs { display: flex; height: 100%; }
.g-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 0 20px; font-size: 15px; font-weight: 600;
  color: var(--text2); cursor: pointer;
  border: none; background: none;
  border-bottom: 3px solid transparent;
  font-family: var(--font);
  transition: color .15s;
}
.g-tab:hover { color: var(--text); }
.g-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.g-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.g-date { font-size: 14px; color: var(--text3); }
.g-saved { font-size: 14px; color: var(--green); display: none; align-items: center; gap: 4px; }
.g-saved.show { display: flex; }

/* ═══ 페이지 ═══ */
.page { display: none; }
.page.active { display: block; }

/* ═══ 공통 버튼 ═══ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--white); color: var(--text);
  font-size: 14px; cursor: pointer;
  font-family: var(--font); font-weight: 600;
  transition: background .12s;
}
.btn:hover { background: var(--bg2); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #4F46E5; }
.btn.sm { font-size: 14px; padding: 5px 12px; }
.btn.danger { color: var(--red); border-color: #FECACA; }
.btn.danger:hover { background: var(--red-soft); }
.btn.teal { background: var(--teal); border-color: var(--teal); color: #fff; }
.btn.teal:hover { background: #0C8278; }

/* ═══ 대시보드 ═══ */
#page-dashboard { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
.db-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
.db-title { font-size: 22px; font-weight: 800; }
.db-sub { font-size: 14px; color: var(--text3); margin-top: 4px; }

.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 1.5rem; }
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
.kpi-label { font-size: 14px; color: var(--text3); margin-bottom: 6px; }
.kpi-val { font-size: 28px; font-weight: 800; color: var(--text); }
.kpi-val.ok { color: var(--green); }
.kpi-val.warn { color: var(--amber); }
.kpi-val.danger { color: var(--red); }

.section { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
.sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px; }
.sec-title { font-size: 15px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 7px; }

.open-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
.open-item:last-child { border-bottom: none; }
.open-name { font-size: 15px; font-weight: 600; }
.open-note { font-size: 14px; color: var(--text2); margin-top: 4px; }
.open-member { font-size: 14px; color: var(--text3); margin-top: 2px; }

.dday { font-size: 14px; font-weight: 700; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
.dday.neg { background: var(--red-soft); color: var(--red); }
.dday.soon { background: var(--amber-soft); color: var(--amber); }
.dday.good { background: var(--green-soft); color: var(--green); }
.dday.today2 { background: var(--accent-soft); color: var(--accent); }

.badge { font-size: 12px; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }
.badge.delay { background: var(--red-soft); color: var(--red); }
.badge.ontime { background: var(--green-soft); color: var(--green); }

.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 14px; color: var(--text2); }
.leg-dot { width: 13px; height: 13px; border-radius: 3px; }

.tl-months { display: flex; margin-bottom: 6px; }
.tl-month { font-size: 14px; color: var(--text3); text-align: center; }
.tl-row { margin-bottom: 24px; }
.tl-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 4px; }
.tl-pname { font-size: 14px; font-weight: 600; }
.tl-dates { font-size: 14px; color: var(--text3); }
.tl-bar-wrap { position: relative; height: 28px; margin-top: 20px; }
.tl-bg { position: absolute; inset: 0; background: var(--bg2); border-radius: 4px; }
.tl-seg { position: absolute; top: 4px; height: 20px; border-radius: 3px; font-size: 12px; display: flex; align-items: center; padding: 0 6px; white-space: nowrap; overflow: hidden; }
.seg-d { background: #9FE1CB; color: #085041; }
.seg-p { background: #B5D4F4; color: #0C447C; }
.seg-dev { background: #D3D1C7; color: #444; }
.seg-t { background: #FAC775; color: #633806; }
.today-line { position: absolute; top: -5px; width: 2px; background: var(--red); height: 38px; border-radius: 1px; z-index: 5; }
.today-tip { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--red); white-space: nowrap; font-weight: 700; }
.open-marker { position: absolute; top: 0; width: 2px; height: 28px; background: var(--accent); border-radius: 1px; z-index: 4; }
.end-lbl { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--accent); white-space: nowrap; font-weight: 700; }

/* 레드마인 */
.rm-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.rm-tab { font-size: 14px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border2); background: var(--white); color: var(--text2); cursor: pointer; font-family: var(--font); transition: all .12s; }
.rm-tab:hover { border-color: var(--accent); color: var(--accent); }
.rm-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.rm-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.issue-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.issue-table th { font-size: 14px; color: var(--text3); font-weight: 600; text-align: left; padding: 8px; border-bottom: 1px solid var(--border); }
.issue-table td { font-size: 14px; padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.issue-table tr:last-child td { border-bottom: none; }
.issue-table tr:hover td { background: var(--bg2); }
.st-badge { font-size: 13px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.st-대기 { background: var(--amber-soft); color: var(--amber); }
.st-신규 { background: var(--blue-soft); color: var(--blue); }
.st-진행 { background: var(--green-soft); color: var(--green); }
.st-수정완료 { background: var(--accent-soft); color: var(--accent); }
.st-default { background: var(--bg2); color: var(--text2); }

/* 대시보드 모달 */
.db-modal-bg { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.db-modal-bg.open { display: flex; }
.db-modal { background: var(--white); border-radius: 16px; padding: 1.75rem; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.14); }
.db-modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.db-modal-title { font-size: 18px; font-weight: 800; }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 14px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 600; }
.form-input { width: 100%; font-size: 14px; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border2); background: var(--white); color: var(--text); font-family: var(--font); transition: border-color .12s; }
.form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-section-lbl { font-size: 14px; font-weight: 700; color: var(--text2); margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
.rm-tip { font-size: 14px; color: var(--text2); background: var(--bg2); border-radius: 10px; padding: 12px 14px; line-height: 1.7; margin-bottom: 14px; }

.empty-msg { text-align: center; padding: 2rem; font-size: 15px; color: var(--text3); }
.loading-row { text-align: center; padding: 1.5rem; font-size: 15px; color: var(--text3); }

/* 토스트 */
.toast { position: fixed; bottom: 28px; right: 28px; background: var(--text); color: #fff; font-size: 15px; padding: 12px 20px; border-radius: 10px; z-index: 999; opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }

/* ═══════════════════════════════════════
   지식지갑 — 원본 사이트 디자인 톤 완전 재현
═══════════════════════════════════════ */
#page-knowledge { background: #f7f7f5; }

/* 상단 바 */
.kw-topbar {
  background: rgba(247,247,245,.94);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid #e0e0dc;
  padding: 0 1.5rem;
}
.kw-topbar-inner {
  max-width: 1100px; margin: 0 auto;
  height: 52px; display: flex; align-items: center; justify-content: space-between;
}
.kw-update { font-size: 14px; color: #aaa; }
.kw-refresh {
  font-size: 14px; padding: 6px 16px; border-radius: 20px;
  border: 1px solid #d0d0cc; background: transparent; color: #666;
  cursor: pointer; font-family: var(--font);
  transition: all .2s;
}
.kw-refresh:hover { border-color: #6366F1; color: #6366F1; background: rgba(99,102,241,.04); }

/* 필터 */
.kw-filter-bar { background: #fff; border-bottom: 1px solid #eee; padding: 0 1.5rem; }
.kw-filter-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; gap: 7px; padding: 12px 0;
  overflow-x: auto; scrollbar-width: none;
}
.kw-filter-inner::-webkit-scrollbar { display: none; }
.kw-fbtn {
  white-space: nowrap; padding: 6px 18px; border-radius: 20px;
  border: 1px solid #ddd; background: transparent; color: #666;
  font-size: 14px; font-family: var(--font); cursor: pointer;
  transition: all .18s; flex-shrink: 0;
}
.kw-fbtn:hover { border-color: #bbb; color: #333; background: #f9f9f9; }
.kw-fbtn.active { font-weight: 600; border-color: transparent; }
.kw-fbtn[data-cat="all"].active      { background: #111; color: #fff; }
.kw-fbtn[data-cat="figma"].active    { background: var(--col-figma);    color: #fff; }
.kw-fbtn[data-cat="adobe"].active    { background: var(--col-adobe);    color: #fff; }
.kw-fbtn[data-cat="industry"].active { background: var(--col-industry); color: #fff; }
.kw-fbtn[data-cat="design"].active   { background: var(--col-design);   color: #fff; }
.kw-fbtn[data-cat="trend"].active    { background: var(--col-trend);    color: #fff; }
.kw-fbtn[data-cat="frontend"].active { background: var(--col-frontend); color: #fff; }
.kw-fbtn[data-cat="ai"].active       { background: var(--col-ai);       color: #fff; }

/* 메인 */
.kw-main { max-width: 1100px; margin: 0 auto; padding: 28px 1.5rem; }
.kw-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 22px; }
.kw-meta-title { font-size: 14px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #999; }
.kw-meta-count { font-size: 14px; color: #ccc; }

/* 카드 그리드 */
.kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 14px; }

/* 카드 */
.kw-card {
  background: #fff; border: 1px solid #e8e8e4; border-radius: 12px;
  overflow: hidden; cursor: pointer;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  display: flex; flex-direction: column;
  animation: kwFadeUp .35s ease both;
}
.kw-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.07); border-color: #d0d0cc; }
@keyframes kwFadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }

.kw-card-accent { height: 3px; }
.kw-card-body { padding: 18px 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
.kw-card-top { display: flex; justify-content: space-between; align-items: center; }
.kw-cat-chip { font-size: 14px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.kw-card-date { font-size: 14px; color: #bbb; }
.kw-card-title { font-size: 16px; font-weight: 700; line-height: 1.5; color: #111; word-break: keep-all; }
.kw-card-summary { font-size: 14px; color: #666; line-height: 1.7; word-break: keep-all; flex: 1; }
.kw-card-kws { display: flex; flex-wrap: wrap; gap: 5px; }
.kw-tag { font-size: 14px; padding: 3px 9px; border-radius: 4px; background: #f4f4f2; color: #888; border: 1px solid #eee; }
.kw-card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #f0f0ee; margin-top: auto; }
.kw-card-source { font-size: 14px; color: #bbb; }
.kw-card-more { font-size: 14px; font-weight: 600; color: #2563eb; }

/* 카드 accent 색상 */
.kw-card-figma    .kw-card-accent { background: var(--col-figma); }
.kw-card-adobe    .kw-card-accent { background: var(--col-adobe); }
.kw-card-industry .kw-card-accent { background: var(--col-industry); }
.kw-card-design   .kw-card-accent { background: var(--col-design); }
.kw-card-trend    .kw-card-accent { background: var(--col-trend); }
.kw-card-frontend .kw-card-accent { background: var(--col-frontend); }
.kw-card-ai       .kw-card-accent { background: var(--col-ai); }

/* chip 색 */
.chip-figma    { background: var(--bg-figma);    color: var(--col-figma); }
.chip-adobe    { background: var(--bg-adobe);    color: var(--col-adobe); }
.chip-industry { background: var(--bg-industry); color: var(--col-industry); }
.chip-design   { background: var(--bg-design);   color: var(--col-design); }
.chip-trend    { background: var(--bg-trend);    color: var(--col-trend); }
.chip-frontend { background: var(--bg-frontend); color: var(--col-frontend); }
.chip-ai       { background: var(--bg-ai);       color: var(--col-ai); }

/* 로딩 */
.kw-loading { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #bbb; font-size: 15px; }
.kw-dots span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #2563eb; margin: 0 3px; animation: kwDot 1.2s infinite; opacity: .3; }
.kw-dots span:nth-child(2) { animation-delay: .2s; }
.kw-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes kwDot { 0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-7px);opacity:1;} }

/* 지식지갑 모달 */
.kw-modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(10,10,10,.56); backdrop-filter: blur(6px);
  z-index: 500; align-items: center; justify-content: center; padding: 20px;
}
.kw-modal-bg.open { display: flex; animation: kwOverlayIn .2s ease; }
@keyframes kwOverlayIn { from{opacity:0;}to{opacity:1;} }

.kw-modal-panel {
  background: #fff; border-radius: 20px;
  max-width: 580px; width: 100%; max-height: 88vh; overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,.22);
  animation: kwModalIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes kwModalIn { from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);} }

.kw-m-accent { height: 5px; border-radius: 20px 20px 0 0; }
.kw-m-inner { padding: 30px 32px 32px; }
.kw-m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
.kw-m-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.kw-m-close {
  width: 34px; height: 34px; border-radius: 50%;
  background: #f4f4f2; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #888; transition: background .15s;
}
.kw-m-close:hover { background: #eee; color: #333; }
.kw-m-date { font-size: 14px; color: #ccc; }
.kw-m-title { font-size: 20px; font-weight: 800; line-height: 1.45; color: #0f0f0f; word-break: keep-all; margin: 0 0 8px; }
.kw-m-src-row { display: flex; align-items: center; gap: 8px; margin-bottom: 22px; }
.kw-m-src-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.kw-m-src-txt { font-size: 15px; color: #aaa; }
.kw-m-divider { border: none; border-top: 1px solid #f0f0ee; margin: 20px 0; }
.kw-m-lbl { font-size: 14px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #bbb; margin: 0 0 10px; }
.kw-m-summary { font-size: 16px; color: #333; line-height: 1.85; word-break: keep-all; }
.kw-m-points { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.kw-m-points li { display: flex; gap: 10px; align-items: flex-start; font-size: 15px; color: #444; line-height: 1.65; }
.kw-m-pt-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 8px; flex-shrink: 0; }
.kw-m-kws { display: flex; flex-wrap: wrap; gap: 7px; }
.kw-m-kw { font-size: 14px; padding: 5px 13px; border-radius: 20px; background: #f4f4f2; color: #777; border: 1px solid #ebebeb; }

    </div>

<div class="toast" id="toast"></div>

<script>
/* ═══ 공통 유틸 ═══ */
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
document.getElementById('g-date').textContent =
  TODAY.getFullYear() + '.' + (TODAY.getMonth()+1) + '.' + TODAY.getDate();

const fmt  = d => (d.getMonth()+1) + '/' + d.getDate();
const fmtI = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
const parseD = s => { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); };
const ddayOf = d => {
  const diff = Math.round((d-TODAY)/86400000);
  if(diff===0) return {txt:'D-Day', cls:'today2'};
  if(diff>0)   return {txt:'D-'+diff, cls:diff<=7?'soon':'good'};
  return {txt:'D+'+Math.abs(diff), cls:'neg'};
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}
function showSaved(){
  const el=document.getElementById('g-saved');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'), 2000);
}

/* ═══ 페이지 전환 ═══ */
let kwInited = false;
function switchPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  if(id === 'knowledge' && !kwInited) { kwLoad(); kwInited = true; }
}

/* ═══ 로컬스토리지 ═══ */
const LS_P='wd_projects', LS_R='wd_rmcfg', LS_M='wd_rm_manual';
function lsSave(){
  try{
    localStorage.setItem(LS_P, JSON.stringify(projects));
    localStorage.setItem(LS_R, JSON.stringify(rmCfg));
    localStorage.setItem(LS_M, JSON.stringify(rmIssues.filter(i=>i._m)));
    showSaved();
  }catch(e){}
}
function lsLoad(){
  try{
    const p=localStorage.getItem(LS_P); if(p) projects=JSON.parse(p);
    const r=localStorage.getItem(LS_R); if(r) rmCfg={...rmCfg,...JSON.parse(r)};
    const m=localStorage.getItem(LS_M); if(m) rmIssues=JSON.parse(m);
    if(projects.length) nextPid = Math.max(...projects.map(x=>x.id))+1;
  }catch(e){}
}

/* ═══ 대시보드 데이터 ═══ */
let projects=[], nextPid=1;
let rmCfg = { url:'http://10.30.100.24', key:'', proj:'hb_design', waitSt:'대기,신규' };
let rmIssues=[], rmFilter='대기', rmFetched=false;
let modalMode='', editId=null;

const SAMPLE = () => [
  { id:1, name:'초등 수학 앱 개선',
    open: fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+7)),
    design:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-15)), fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-7))],
    pub:   [fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-7)),  fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+1))],
    dev:   [fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-10)), fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+3))],
    test:  [fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate())),    fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+6))],
    members:'김민지, 박준호', note:'기획리뷰 완료. 디자인 QA 필요.' },
  { id:2, name:'중등 국어 LMS UI',
    open: fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+20)),
    design:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-5)),  fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+4))],
    pub:   [fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+4)),  fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+12))],
    dev:   [fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+2)),  fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+16))],
    test:  [fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+14)), fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+19))],
    members:'이수현, 최유나', note:'' },
];

lsLoad();
if(!projects.length){ projects=SAMPLE(); nextPid=3; }

/* ═══ 대시보드 렌더 ═══ */
function dbRender(){ dbKpi(); dbOpenList(); dbTimeline(); rmRender(); }

function dbKpi(){
  let over=0,warn=0,month=0;
  projects.forEach(p=>{
    const d=parseD(p.open), diff=Math.round((d-TODAY)/86400000);
    if(diff<0) over++;
    if(diff>=0&&diff<=7) warn++;
    if(d.getMonth()===TODAY.getMonth()&&d.getFullYear()===TODAY.getFullYear()) month++;
  });
  document.getElementById('db-kpi').innerHTML=`
    <div class="kpi"><div class="kpi-label">전체 프로젝트</div><div class="kpi-val">${projects.length}</div></div>
    <div class="kpi"><div class="kpi-label">이번 달 오픈</div><div class="kpi-val ok">${month}</div></div>
    <div class="kpi"><div class="kpi-label">딜레이 위험</div><div class="kpi-val warn">${warn}</div></div>
    <div class="kpi"><div class="kpi-label">오픈 초과</div><div class="kpi-val danger">${over}</div></div>`;
}

function dbOpenList(){
  const el=document.getElementById('db-openlist');
  if(!projects.length){ el.innerHTML='<div class="empty-msg">등록된 프로젝트가 없어요</div>'; return; }
  el.innerHTML=[...projects].sort((a,b)=>parseD(a.open)-parseD(b.open)).map(p=>{
    const dd=ddayOf(parseD(p.open));
    const delay=Math.round((parseD(p.open)-TODAY)/86400000)<0;
    return `<div class="open-item">
      <div style="flex:1;min-width:0;">
        <div><span class="open-name">${p.name}</span>
          <span style="font-size:14px;color:var(--text3);margin-left:6px;">오픈 ${fmt(parseD(p.open))}</span>
          <span class="badge ${delay?'delay':'ontime'}">${delay?'딜레이':'정상'}</span></div>
        ${p.note?`<div class="open-note"><i class="ti ti-notes" style="font-size:14px;"></i> ${p.note}</div>`:''}
        <div class="open-member">담당: ${p.members||'—'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:14px;">
        <span class="dday ${dd.cls}">${dd.txt}</span>
        <button class="btn sm" onclick="dbShowForm('edit',${p.id})"><i class="ti ti-edit"></i></button>
        <button class="btn sm danger" onclick="dbDel(${p.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function dbTimeline(){
  if(!projects.length){
    document.getElementById('db-timeline').innerHTML='<div class="empty-msg">등록된 프로젝트가 없어요</div>';
    document.getElementById('db-tlmonths').innerHTML=''; return;
  }
  let mn=new Date(TODAY), mx=new Date(TODAY);
  projects.forEach(p=>{
    [p.design,p.pub,p.dev,p.test].forEach(r=>{
      const a=parseD(r[0]),b=parseD(r[1]);
      if(a<mn)mn=new Date(a); if(b>mx)mx=new Date(b);
    });
    const od=parseD(p.open); if(od<mn)mn=new Date(od); if(od>mx)mx=new Date(od);
  });
  mn.setDate(mn.getDate()-4); mx.setDate(mx.getDate()+8);
  const TOTAL=Math.max(1,Math.round((mx-mn)/86400000));
  const pct  = s => (Math.round((parseD(s)-mn)/86400000)/TOTAL*100).toFixed(2)+'%';
  const wpct = (s,e)=> Math.max(0.5,(Math.round((parseD(e)-parseD(s))/86400000)/TOTAL*100)).toFixed(2)+'%';
  const todayP=(Math.round((TODAY-mn)/86400000)/TOTAL*100).toFixed(2);

  const mhdr=document.getElementById('db-tlmonths'); mhdr.innerHTML='';
  let cur=new Date(mn.getFullYear(),mn.getMonth(),1);
  while(cur<=mx){
    const me=new Date(cur.getFullYear(),cur.getMonth()+1,0);
    const vs=cur<mn?mn:cur, ve=me>mx?mx:me;
    const w=(Math.round((ve-vs)/86400000)+1)/TOTAL*100;
    const d=document.createElement('div');
    d.className='tl-month'; d.style.width=w.toFixed(1)+'%';
    d.textContent=(cur.getMonth()+1)+'월'; mhdr.appendChild(d);
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }

  document.getElementById('db-timeline').innerHTML=[...projects]
    .sort((a,b)=>parseD(a.open)-parseD(b.open)).map(p=>{
      const delay=Math.round((parseD(p.open)-TODAY)/86400000)<0;
      const op=(Math.round((parseD(p.open)-mn)/86400000)/TOTAL*100).toFixed(2);
      return `<div class="tl-row">
        <div class="tl-meta">
          <span class="tl-pname">${p.name}<span class="badge ${delay?'delay':'ontime'}" style="margin-left:7px;">${delay?'딜레이':'정상'}</span></span>
          <span class="tl-dates">엔딩 ${fmt(parseD(p.test[1]))} → 오픈 ${fmt(parseD(p.open))}</span>
        </div>
        <div class="tl-bar-wrap">
          <div class="tl-bg"></div>
          <div class="tl-seg seg-d"   style="left:${pct(p.design[0])};width:${wpct(p.design[0],p.design[1])}">디자인</div>
          <div class="tl-seg seg-p"   style="left:${pct(p.pub[0])};width:${wpct(p.pub[0],p.pub[1])}">퍼블</div>
          <div class="tl-seg seg-dev" style="left:${pct(p.dev[0])};width:${wpct(p.dev[0],p.dev[1])}">개발</div>
          <div class="tl-seg seg-t"   style="left:${pct(p.test[0])};width:${wpct(p.test[0],p.test[1])}">테스트</div>
          <div class="open-marker" style="left:${op}%"><span class="end-lbl">오픈 ${fmt(parseD(p.open))}</span></div>
          <div class="today-line" style="left:${todayP}%"><span class="today-tip">오늘</span></div>
        </div>
      </div>`;
    }).join('');
}

/* ═══ 레드마인 ═══ */
function rmRender(){
  const area=document.getElementById('rm-area');
  const waitSts=rmCfg.waitSt.split(',').map(s=>s.trim());
  const filtered=rmFilter==='전체'?rmIssues:rmIssues.filter(i=>i.status?.name===rmFilter);
  const wc=rmIssues.filter(i=>waitSts.includes(i.status?.name)).length;
  document.getElementById('rm-badge').textContent=`대기 ${wc}건`;
  const sts=[...new Set(['대기','신규','진행','수정완료',...rmIssues.map(i=>i.status?.name).filter(Boolean)]),'전체'];
  const tabs=`<div class="rm-tabs">${[...new Set(sts)].map(s=>`<button class="rm-tab ${rmFilter===s?'active':''}" onclick="rmSetFilter('${s}')">${s}</button>`).join('')}</div>`;
  if(!rmFetched){ area.innerHTML=tabs+'<div class="loading-row">레드마인 일감 불러오는 중...</div>'; rmFetch(false); return; }
  if(!filtered.length){ area.innerHTML=`<div class="rm-toolbar">${tabs}</div><div class="empty-msg">${rmFilter} 상태 일감이 없어요</div>`; return; }
  area.innerHTML=`<div class="rm-toolbar">${tabs}<span style="font-size:14px;color:var(--text2);">${rmFilter} <strong>${filtered.length}</strong>건</span></div>
  <table class="issue-table"><thead><tr>
    <th style="width:52px;">번호</th><th>제목</th>
    <th style="width:74px;">상태</th><th style="width:74px;">담당자</th>
    <th style="width:80px;">시작일</th><th style="width:42px;"></th>
  </tr></thead><tbody>${filtered.map(i=>`<tr>
    <td style="color:var(--text3);">#${i.id}</td>
    <td title="${i.subject}">${i.subject}</td>
    <td><span class="st-badge st-${i.status?.name||'default'}">${i.status?.name||'—'}</span></td>
    <td>${i.assigned_to?.name||'미배정'}</td>
    <td style="color:var(--text3);">${i.start_date||'—'}</td>
    <td><button class="btn sm danger" onclick="rmDel(${i.id})"><i class="ti ti-x"></i></button></td>
  </tr>`).join('')}</tbody></table>`;
}

function rmSetFilter(s){ rmFilter=s; rmRender(); }
function rmDel(id){ rmIssues=rmIssues.filter(x=>x.id!==id); lsSave(); rmRender(); toast('일감을 삭제했어요'); }

async function rmFetch(manual){
  if(manual){ document.getElementById('rm-area').innerHTML='<div class="loading-row">불러오는 중...</div>'; }
  if(!rmCfg.key){ rmFetched=true; rmRender(); return; }
  try{
    const r=await fetch(`${rmCfg.url}/projects/${rmCfg.proj}/issues.json?key=${rmCfg.key}&limit=100&status_id=open`);
    if(!r.ok){ rmFetched=true; rmRender(); return; }
    const data=await r.json();
    rmIssues=[...rmIssues.filter(i=>i._m),...(data.issues||[])];
    rmFetched=true; lsSave(); rmRender();
    if(manual) toast('레드마인 일감을 불러왔어요');
  }catch(e){ rmFetched=true; rmRender(); if(manual) toast('연결 실패 — API 설정을 확인해주세요'); }
}

function dbModalSave(){
  if(modalMode==='add'||modalMode==='edit'){
    const name=document.getElementById('f-name').value.trim();
    const open=document.getElementById('f-open').value;
    if(!name||!open){ alert('프로젝트명과 오픈일은 필수예요.'); return; }
    const g = id => document.getElementById(id)?.value || open;
    const obj={name,open,design:[g('f-ds'),g('f-de')],pub:[g('f-ps'),g('f-pe')],dev:[g('f-devs'),g('f-deve')],test:[g('f-ts'),g('f-te')],members:document.getElementById('f-members').value,note:document.getElementById('f-note').value};
    if(modalMode==='add'){ obj.id=nextPid++; projects.push(obj); }
    else{ const i=projects.findIndex(x=>x.id===editId); if(i>=0){obj.id=editId;projects[i]=obj;} }
    toast(modalMode==='add'?'프로젝트를 추가했어요':'프로젝트를 수정했어요');
  } else if(modalMode==='rm-manual'){
    const subj=document.getElementById('f-rsubj').value.trim();
    if(!subj){ alert('제목을 입력해주세요.'); return; }
    const rid=parseInt(document.getElementById('f-rid').value)||Math.floor(Math.random()*900+1100);
    rmIssues.unshift({id:rid,subject:subj,status:{name:document.getElementById('f-rst').value},assigned_to:{name:document.getElementById('f-rassign').value||'미배정'},start_date:document.getElementById('f-rdate').value,_m:true});
    toast('일감을 추가했어요');
  } else if(modalMode==='rm-api'){
    rmCfg.url  =document.getElementById('f-rmurl').value.trim().replace(/\/$/,'');
    rmCfg.key  =document.getElementById('f-rmkey').value.trim();
    rmCfg.proj =document.getElementById('f-rmproj').value.trim();
    rmCfg.waitSt=document.getElementById('f-rmwait').value.trim();
    rmFetched=false; toast('API 설정을 저장했어요');
  }
  lsSave(); dbModalClose(); dbRender();
  if(modalMode==='rm-api') rmFetch(false);
}

async function rmTestApi(){
  const url=document.getElementById('f-rmurl').value.trim().replace(/\/$/,'');
  const key=document.getElementById('f-rmkey').value.trim();
  const proj=document.getElementById('f-rmproj').value.trim();
  const msg=document.getElementById('rm-test-msg');
  msg.style.color='var(--text3)'; msg.textContent='연결 확인 중...';
  try{
    const r=await fetch(`${url}/projects/${proj}/issues.json?key=${key}&limit=1`);
    if(r.ok){ msg.style.color='var(--green)'; msg.textContent='✓ 연결 성공! 저장 후 일감이 자동으로 불러와져요.'; }
    else{ msg.style.color='var(--red)'; msg.textContent='✗ '+r.status+' — API Key 또는 프로젝트 ID를 확인해주세요.'; }
  }catch(e){ msg.style.color='var(--red)'; msg.textContent='✗ 연결 실패. 사내 PC에서 열어야 내부망 접속 가능해요.'; }
}

const KW_LABEL = {figma:'피그마 신기능',adobe:'어도비 신기능',ai:'🤖 AI 뉴스',industry:'업계동향',design:'디자인',trend:'트렌드',frontend:'프론트엔드'};

let kwCards=[], kwCurFilter='all';

async function kwLoad(){
  document.getElementById('kw-grid').innerHTML='<div class="kw-loading"><div class="kw-dots"><span></span><span></span><span></span></div><p style="margin-top:14px;">뉴스를 불러오는 중이에요</p></div>';
  try{
    const res=await fetch('news.json?t='+Date.now());
    if(!res.ok) throw 0;
    const data=await res.json();
    kwCards=data.articles||[];
    document.getElementById('kw-update-time').textContent=data.updated?'업데이트 '+data.updated:'';
  }catch{
    kwCards=kwSample();
    document.getElementById('kw-update-time').textContent='샘플 데이터';
  }
  kwRender();
}

function kwRender(){
  const filtered=kwCurFilter==='all'?kwCards:kwCards.filter(c=>c.category===kwCurFilter);
  const list=[...filtered].sort((a,b)=>{
    const da=a.publishedAt||a.collectedAt||'', db=b.publishedAt||b.collectedAt||'';
    return db.localeCompare(da);
  });
  document.getElementById('kw-count').textContent=list.length+'개';
  if(!list.length){ document.getElementById('kw-grid').innerHTML='<div class="kw-loading" style="color:#ccc;">해당 분야의 뉴스가 없어요</div>'; return; }
  document.getElementById('kw-grid').innerHTML=list.map((card,i)=>{
    const idx=kwCards.indexOf(card);
    return `<article class="kw-card kw-card-${card.category}" style="animation-delay:${i*.04}s" onclick="kwOpen(${idx})">
      <div class="kw-card-accent"></div>
      <div class="kw-card-body">
        <div class="kw-card-top">
          <span class="kw-cat-chip chip-${card.category}">${KW_LABEL[card.category]||card.category}</span>
          <span class="kw-card-date">${card.date}</span>
        </div>
        <p class="kw-card-title">${card.title}</p>
        <p class="kw-card-summary">${card.summary}</p>
        <div class="kw-card-kws">${(card.keywords||[]).map(k=>`<span class="kw-tag"># ${k}</span>`).join('')}</div>
        <div class="kw-card-footer">
          <span class="kw-card-source">${card.source}</span>
          <span class="kw-card-more">자세히 보기 →</span>
        </div>
      </div>
    </article>`;
  }).join('');
}

function kwFilter(cat, btn){
  kwCurFilter=cat;
  document.querySelectorAll('.kw-fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  kwRender();
}

function kwOpen(idx){
  const c=kwCards[idx]; if(!c) return;
  const col=KW_COLOR[c.category]||'#888';
  document.getElementById('kw-m-accent').style.background=col;
  document.getElementById('kw-m-src-dot').style.background=col;
  document.getElementById('kw-m-chip').textContent=KW_LABEL[c.category]||c.category;
  document.getElementById('kw-m-chip').className='kw-cat-chip chip-'+c.category;
  document.getElementById('kw-m-date').textContent=c.date;
  document.getElementById('kw-m-title').textContent=c.title;
  document.getElementById('kw-m-src').textContent=c.source;
  document.getElementById('kw-m-link').href=c.url||'#';
  document.getElementById('kw-m-summary').textContent=c.summary||'';
  const full=c.summary_full||c.summary||'';
  const sents=full.split(/(?<=[.!?])\s+/).filter(s=>s.trim().length>5);
  document.getElementById('kw-m-points').innerHTML=sents.map(s=>
    `<li><span class="kw-m-pt-dot" style="background:${col};opacity:.5;"></span><span>${s.trim()}</span></li>`
  ).join('')||`<li><span class="kw-m-pt-dot" style="background:${col};opacity:.5;"></span><span>${full}</span></li>`;
  document.getElementById('kw-m-kws').innerHTML=(c.keywords||[]).map(k=>`<span class="kw-m-kw"># ${k}</span>`).join('');
  window._kwUrl=c.url||location.href;
  document.getElementById('kw-modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}

function kwModalClose(e){ if(e.target===document.getElementById('kw-modal-bg')) kwModalDismiss(); }
function kwModalDismiss(){ document.getElementById('kw-modal-bg').classList.remove('open'); document.body.style.overflow=''; }
function kwCopyLink(){
  navigator.clipboard.writeText(window._kwUrl||location.href).then(()=>{
    const btn=document.querySelector('.kw-m-share');
    const orig=btn.textContent; btn.textContent='✅ 복사됐어요!';
    setTimeout(()=>btn.textContent=orig,2000);
  });
}
