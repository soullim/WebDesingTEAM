<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹디자인팀 포털</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#6366F1;--accent2:#818CF8;--accent-soft:#EEF2FF;
  --teal:#0F9B8E;--teal-soft:#E6FAFA;
  --amber:#F59E0B;--amber-soft:#FFFBEB;
  --red:#EF4444;--red-soft:#FEF2F2;
  --green:#10B981;--green-soft:#ECFDF5;
  --blue:#3B82F6;--blue-soft:#EFF6FF;
  --border:#E2E8F0;--border2:#CBD5E1;
  --bg:#F8FAFC;--bg2:#F1F5F9;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --white:#fff;--r:10px;--r2:14px;
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* NAV */
.site-nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.nav-logo{font-size:15px;font-weight:700;color:var(--accent);margin-right:2rem;white-space:nowrap;letter-spacing:-.3px;}
.nav-logo span{color:var(--text);}
.nav-tabs{display:flex;height:100%;}
.nav-tab{display:flex;align-items:center;gap:6px;padding:0 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:color .15s;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.nav-date{font-size:12px;color:var(--text3);}
.nav-save{font-size:12px;color:var(--green);display:none;align-items:center;gap:4px;}
.nav-save.show{display:flex;}

/* PAGE */
.page{display:none;padding:1.5rem;max-width:1100px;margin:0 auto;}
.page.active{display:block;}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--white);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:background .12s;}
.btn:hover{background:var(--bg2);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{background:#4F46E5;}
.btn.sm{font-size:12px;padding:4px 10px;}
.btn.danger{color:var(--red);border-color:#FECACA;}
.btn.danger:hover{background:var(--red-soft);}
.btn.teal{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn.teal:hover{background:#0C8278;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.kpi-label{font-size:12px;color:var(--text3);margin-bottom:4px;}
.kpi-val{font-size:24px;font-weight:700;color:var(--text);}
.kpi-val.ok{color:var(--green);}
.kpi-val.warn{color:var(--amber);}
.kpi-val.danger{color:var(--red);}

/* SECTION */
.section{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.25rem;margin-bottom:1rem;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.sec-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}

/* OPEN LIST */
.open-item{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.open-item:last-child{border-bottom:none;}
.open-sub{font-size:12px;color:var(--text3);margin-left:6px;}
.open-note{font-size:12px;color:var(--text2);margin-top:3px;}
.dday{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.dday.neg{background:var(--red-soft);color:var(--red);}
.dday.soon{background:var(--amber-soft);color:var(--amber);}
.dday.good{background:var(--green-soft);color:var(--green);}
.dday.today2{background:var(--accent-soft);color:var(--accent);}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;margin-left:6px;}
.badge.delay{background:var(--red-soft);color:var(--red);}
.badge.ontime{background:var(--green-soft);color:var(--green);}

/* TIMELINE */
.tl-row{margin-bottom:22px;}
.tl-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:4px;}
.tl-bar-wrap{position:relative;height:26px;margin-top:18px;}
.tl-bg{position:absolute;inset:0;background:var(--bg2);border-radius:4px;}
.tl-seg{position:absolute;top:3px;height:20px;border-radius:3px;font-size:11px;display:flex;align-items:center;padding:0 5px;white-space:nowrap;overflow:hidden;}
.seg-d{background:#9FE1CB;color:#085041;}
.seg-p{background:#B5D4F4;color:#0C447C;}
.seg-dev{background:#D3D1C7;color:#444441;}
.seg-t{background:#FAC775;color:#633806;}
.today-line{position:absolute;top:-4px;width:2px;background:var(--red);height:34px;border-radius:1px;z-index:5;}
.today-tip{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--red);white-space:nowrap;font-weight:700;}
.open-marker{position:absolute;top:0;width:2px;height:26px;background:var(--accent);border-radius:1px;z-index:4;}
.end-label{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--accent);white-space:nowrap;font-weight:700;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);}
.leg-dot{width:12px;height:12px;border-radius:2px;}
.tl-months{display:flex;margin-bottom:4px;}
.tl-month{font-size:11px;color:var(--text3);text-align:center;}

/* REDMINE */
.rm-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.rm-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.rm-tab{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--white);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s;}
.rm-tab:hover{border-color:var(--accent);color:var(--accent);}
.rm-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
.issue-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.issue-table th{font-size:12px;color:var(--text3);font-weight:500;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);}
.issue-table td{font-size:13px;padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.issue-table tr:last-child td{border-bottom:none;}
.issue-table tr:hover td{background:var(--bg2);}
.st-badge{font-size:11px;padding:2px 10px;border-radius:20px;white-space:nowrap;}
.st-대기{background:var(--amber-soft);color:var(--amber);}
.st-신규{background:var(--blue-soft);color:var(--blue);}
.st-진행{background:var(--green-soft);color:var(--green);}
.st-수정완료{background:var(--accent-soft);color:var(--accent);}
.st-default{background:var(--bg2);color:var(--text2);}
.rm-tip{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--r);padding:10px 12px;line-height:1.7;margin-bottom:12px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--r2);padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.modal-title{font-size:16px;font-weight:700;}
.form-row{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500;}
.form-input{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--white);color:var(--text);font-family:inherit;transition:border-color .12s;}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-section{font-size:12px;font-weight:700;color:var(--text2);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);}
.empty-msg{text-align:center;padding:2rem;font-size:13px;color:var(--text3);}
.loading-row{text-align:center;padding:1.5rem;font-size:13px;color:var(--text3);}

/* KNOWLEDGE */
.kw-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.kw-chip{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--white);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s;}
.kw-chip:hover{border-color:var(--accent);color:var(--accent);}
.kw-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
.news-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.news-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.news-card:hover{border-color:var(--accent2);box-shadow:0 2px 12px rgba(99,102,241,.08);}
.news-cat{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px;}
.news-title{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:6px;color:var(--text);}
.news-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.news-meta{font-size:11px;color:var(--text3);display:flex;justify-content:space-between;}
.kw-detail-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-bottom:1rem;}
.kw-section-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;margin-top:14px;}
.kw-body{font-size:13px;line-height:1.8;color:var(--text);}
.tag{font-size:11px;padding:3px 10px;background:var(--bg2);color:var(--text2);border-radius:20px;display:inline-block;margin:2px;}
.cat-figma{background:#E9D7FD;color:#6B21A8;}
.cat-ai{background:#DBEAFE;color:#1D4ED8;}
.cat-front{background:#DCFCE7;color:#15803D;}
.cat-design{background:#FEF9C3;color:#854D0E;}
.cat-trend{background:#FCE7F3;color:#9D174D;}
.cat-adobe{background:#FFE4CC;color:#9A3412;}
.cat-industry{background:#F3F4F6;color:#374151;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:13px;padding:10px 18px;border-radius:var(--r);z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .news-grid{grid-template-columns:1fr;}
  .form-row-2{grid-template-columns:1fr;}
  .nav-tab span{display:none;}
}

  /* ── 지식지갑 원본 스타일 ── */
  #page-knowledge { background: #f7f7f5; }
  .kw-top-bar { background:#fff; border-bottom:1px solid #eee; padding:10px 1.5rem; }
  .kw-top-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
  .kw-update-badge { font-size:.72rem; color:#aaa; }
  .kw-refresh-btn { font-size:.75rem; padding:5px 14px; border-radius:20px; border:1px solid #d0d0cc; background:transparent; color:#666; cursor:pointer; font-family:inherit; transition:all .2s; }
  .kw-refresh-btn:hover { border-color:#6366F1; color:#6366F1; }
  .kw-filter-wrap { background:#fff; border-bottom:1px solid #eee; padding:0 1.5rem; }
  .kw-filter-inner { max-width:1100px; margin:0 auto; display:flex; gap:6px; padding:12px 0; overflow-x:auto; scrollbar-width:none; }
  .kw-filter-inner::-webkit-scrollbar { display:none; }
  .kw-filter-btn { white-space:nowrap; padding:5px 16px; border-radius:20px; border:1px solid #ddd; background:transparent; color:#666; font-size:.8rem; cursor:pointer; font-family:inherit; transition:all .18s; flex-shrink:0; }
  .kw-filter-btn:hover { border-color:#bbb; color:#333; background:#f9f9f9; }
  .kw-filter-btn.active { font-weight:600; border-color:transparent; }
  .kw-filter-btn[data-cat="all"].active      { background:#111; color:#fff; }
  .kw-filter-btn[data-cat="figma"].active    { background:#3a7d44; color:#fff; }
  .kw-filter-btn[data-cat="adobe"].active    { background:#b84c1a; color:#fff; }
  .kw-filter-btn[data-cat="industry"].active { background:#7b3fa0; color:#fff; }
  .kw-filter-btn[data-cat="design"].active   { background:#1a5fa0; color:#fff; }
  .kw-filter-btn[data-cat="trend"].active    { background:#a06020; color:#fff; }
  .kw-filter-btn[data-cat="frontend"].active { background:#1a7a7a; color:#fff; }
  .kw-filter-btn[data-cat="ai"].active       { background:#c2185b; color:#fff; }
  .kw-main { max-width:1100px; margin:0 auto; padding:28px 1.5rem; }
  .kw-section-meta { display:flex; align-items:baseline; gap:10px; margin-bottom:20px; }
  .kw-section-title { font-size:.72rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:#999; }
  .kw-section-count { font-size:.72rem; color:#ccc; }
  .kw-card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
  .kw-news-card { background:#fff; border:1px solid #e8e8e4; border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .2s,box-shadow .2s,border-color .2s; display:flex; flex-direction:column; animation:kwFadeUp .35s ease both; }
  .kw-news-card:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,.07); border-color:#d0d0cc; }
  @keyframes kwFadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
  .kw-card-accent { height:3px; }
  .kw-card-body { padding:16px 18px; flex:1; display:flex; flex-direction:column; gap:10px; }
  .kw-card-top { display:flex; justify-content:space-between; align-items:center; }
  .kw-cat-chip { font-size:.7rem; font-weight:700; padding:3px 10px; border-radius:20px; }
  .kw-card-date { font-size:.7rem; color:#bbb; }
  .kw-card-title { font-size:.9rem; font-weight:700; line-height:1.5; color:#111; word-break:keep-all; margin:0; }
  .kw-card-summary { font-size:.8rem; color:#666; line-height:1.7; word-break:keep-all; margin:0; flex:1; }
  .kw-card-keywords { display:flex; flex-wrap:wrap; gap:5px; }
  .kw-kw-tag { font-size:.68rem; padding:2px 8px; border-radius:4px; background:#f4f4f2; color:#888; border:1px solid #eee; }
  .kw-card-footer { display:flex; justify-content:space-between; align-items:center; padding-top:10px; border-top:1px solid #f0f0ee; margin-top:auto; }
  .kw-card-source { font-size:.7rem; color:#bbb; }
  .kw-card-link { font-size:.75rem; font-weight:600; color:#2563eb; text-decoration:none; }
  .kw-card-figma    .kw-card-accent { background:#3a7d44; }
  .kw-card-adobe    .kw-card-accent { background:#b84c1a; }
  .kw-card-industry .kw-card-accent { background:#7b3fa0; }
  .kw-card-design   .kw-card-accent { background:#1a5fa0; }
  .kw-card-trend    .kw-card-accent { background:#a06020; }
  .kw-card-frontend .kw-card-accent { background:#1a7a7a; }
  .kw-card-ai       .kw-card-accent { background:#c2185b; }
  .kw-chip-figma    { background:rgba(58,125,68,.08);   color:#3a7d44; }
  .kw-chip-adobe    { background:rgba(184,76,26,.08);   color:#b84c1a; }
  .kw-chip-industry { background:rgba(123,63,160,.08);  color:#7b3fa0; }
  .kw-chip-design   { background:rgba(26,95,160,.08);   color:#1a5fa0; }
  .kw-chip-trend    { background:rgba(160,96,32,.08);   color:#a06020; }
  .kw-chip-frontend { background:rgba(26,122,122,.08);  color:#1a7a7a; }
  .kw-chip-ai       { background:rgba(194,24,91,.08);   color:#c2185b; }
  .kw-loading-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:#bbb; font-size:.85rem; }
  .kw-dots span { display:inline-block; width:7px; height:7px; border-radius:50%; background:#2563eb; margin:0 3px; animation:kwDot 1.2s infinite; opacity:.3; }
  .kw-dots span:nth-child(2) { animation-delay:.2s; }
  .kw-dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes kwDot { 0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-7px);opacity:1;} }
  /* 지식지갑 모달 */
  .kw-modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,10,10,.55); backdrop-filter:blur(6px); z-index:500; align-items:center; justify-content:center; padding:20px; }
  .kw-modal-overlay.open { display:flex; }
  .kw-modal-panel { background:#fff; border-radius:20px; max-width:580px; width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 32px 80px rgba(0,0,0,.22); animation:kwModalIn .25s cubic-bezier(.34,1.56,.64,1); }
  @keyframes kwModalIn { from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);} }
  .kw-modal-accent { height:5px; border-radius:20px 20px 0 0; }
  .kw-modal-inner { padding:30px 32px 32px; }
  .kw-modal-header-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; }
  .kw-modal-meta { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .kw-modal-close { width:32px; height:32px; border-radius:50%; background:#f4f4f2; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; color:#888; transition:background .15s; }
  .kw-modal-close:hover { background:#eee; color:#333; }
  .kw-modal-title { font-size:1.25rem; font-weight:700; line-height:1.45; color:#0f0f0f; word-break:keep-all; margin:0 0 6px; }
  .kw-modal-source-row { display:flex; align-items:center; gap:8px; margin-bottom:20px; }
  .kw-modal-source-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .kw-modal-source-text { font-size:.78rem; color:#aaa; }
  .kw-modal-date-text { font-size:.78rem; color:#ccc; }
  .kw-modal-divider { border:none; border-top:1px solid #f0f0ee; margin:20px 0; }
  .kw-modal-section-label { font-size:.68rem; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:#bbb; margin:0 0 10px; }
  .kw-modal-summary { font-size:.9rem; color:#333; line-height:1.85; word-break:keep-all; margin:0; }
  .kw-modal-point-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px; }
  .kw-modal-point-list li { display:flex; gap:10px; align-items:flex-start; font-size:.85rem; color:#444; line-height:1.65; }
  .kw-modal-point-dot { width:6px; height:6px; border-radius:50%; margin-top:7px; flex-shrink:0; }
  .kw-modal-kw-wrap { display:flex; flex-wrap:wrap; gap:6px; }
  .kw-modal-kw-tag { font-size:.75rem; padding:4px 12px; border-radius:20px; background:#f4f4f2; color:#777; border:1px solid #ebebeb; }
  .kw-modal-footer { display:flex; justify-content:space-between; align-items:center; padding-top:20px; border-top:1px solid #f0f0ee; margin-top:4px; }
  .kw-modal-go-btn { display:inline-flex; align-items:center; gap:6px; font-size:.85rem; font-weight:700; padding:11px 22px; border-radius:10px; background:#2563eb; color:#fff; text-decoration:none; transition:background .18s; font-family:inherit; border:none; cursor:pointer; }
  .kw-modal-go-btn:hover { background:#1d4ed8; }
  .kw-modal-share-btn { font-size:.8rem; color:#aaa; background:none; border:1px solid #eee; border-radius:8px; padding:10px 16px; cursor:pointer; font-family:inherit; transition:all .15s; }
  .kw-modal-share-btn:hover { border-color:#ccc; color:#666; }
</style>
</head>
<body>

<nav class="site-nav">

// ── 날짜 유틸 ──
const TODAY = new Date();
TODAY.setHours(0,0,0,0);
document.getElementById('nav-date').textContent =
  TODAY.getFullYear() + '.' + (TODAY.getMonth()+1) + '.' + TODAY.getDate();

function fmt(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
function fmtI(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseD(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function dday(d){
  const diff = Math.round((d - TODAY) / 86400000);
  if(diff===0) return {txt:'D-Day', cls:'today2'};
  if(diff>0)   return {txt:'D-'+diff, cls: diff<=7?'soon':'good'};
  return {txt:'D+'+Math.abs(diff), cls:'neg'};
}

// ── 로컬스토리지 저장/불러오기 ──
const LS_PROJ = 'wd_projects';
const LS_RM   = 'wd_rm_config';
const LS_RMISSUES = 'wd_rm_manual';

function saveData(){
  try{
    localStorage.setItem(LS_PROJ, JSON.stringify(projects));
    localStorage.setItem(LS_RM,   JSON.stringify(rmConfig));
    const manuals = rmIssues.filter(i=>i._manual);
    localStorage.setItem(LS_RMISSUES, JSON.stringify(manuals));
    showSaveIndicator();
  }catch(e){}
}
function loadData(){
  try{
    const p = localStorage.getItem(LS_PROJ);
    if(p) projects = JSON.parse(p);
    const r = localStorage.getItem(LS_RM);
    if(r) rmConfig = {...rmConfig, ...JSON.parse(r)};
    const m = localStorage.getItem(LS_RMISSUES);
    if(m) rmIssues = JSON.parse(m);
    if(projects.length) nextPid = Math.max(...projects.map(x=>x.id)) + 1;
  }catch(e){}
}
function showSaveIndicator(){
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── 데이터 ──
let projects = [];
let nextPid = 1;
let rmConfig = {
  url: 'http://10.30.100.24',
  apiKey: '',           // ← 보안상 비워둠. API 설정에서 입력
  projectId: 'hb_design',
  waitStatus: '대기,신규'
};
let rmIssues = [];
let rmFilter = '대기';
let rmFetched = false;
let modalMode = '', editId = null;

// ── 초기 샘플 데이터 (로컬스토리지가 비어있을 때만) ──
const SAMPLE_PROJECTS = [
  {id:1,name:'초등 수학 앱 개선',open: fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+7)),
   design:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-15)),fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-7))],
   pub:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-7)),fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+1))],
   dev:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-10)),fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+3))],
   test:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate())),fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+6))],
   members:'김민지, 박준호', note:'기획리뷰 완료. 디자인 QA 필요.'},
  {id:2,name:'중등 국어 LMS UI',open: fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+20)),
   design:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()-5)),fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+4))],
   pub:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+4)),fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+12))],
   dev:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+2)),fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+16))],
   test:[fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+14)),fmtI(new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()+19))],
   members:'이수현, 최유나', note:''},
];

function renderDash(){
  renderKPI();
  renderOpenList();

  renderRedmineArea();

function renderKPI(){
  let over=0, warn=0, month=0;
  projects.forEach(p=>{
    const d=parseD(p.open), diff=Math.round((d-TODAY)/86400000);
    if(diff<0) over++;
    if(diff>=0&&diff<=7) warn++;
    if(d.getMonth()===TODAY.getMonth()&&d.getFullYear()===TODAY.getFullYear()) month++;
  });
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi"><div class="kpi-label">전체 프로젝트</div><div class="kpi-val">${projects.length}</div></div>
    <div class="kpi"><div class="kpi-label">이번 달 오픈</div><div class="kpi-val ok">${month}</div></div>
    <div class="kpi"><div class="kpi-label">딜레이 위험</div><div class="kpi-val warn">${warn}</div></div>
    <div class="kpi"><div class="kpi-label">오픈 초과</div><div class="kpi-val danger">${over}</div></div>`;
}

function renderOpenList(){
  const el = document.getElementById('open-list');
  if(!projects.length){ el.innerHTML='<div class="empty-msg">등록된 프로젝트가 없어요<br><small>상단 [프로젝트 추가] 버튼으로 추가해요</small></div>'; return; }
  el.innerHTML = [...projects].sort((a,b)=>parseD(a.open)-parseD(b.open)).map(p=>{
    const dd = dday(parseD(p.open));
    const isDelay = Math.round((parseD(p.open)-TODAY)/86400000) < 0;
    return `<div class="open-item">
      <div style="flex:1;min-width:0;">
        <div><span style="font-size:14px;font-weight:500;">${p.name}</span>
          <span class="open-sub">오픈 ${fmt(parseD(p.open))}</span>
          <span class="badge ${isDelay?'delay':'ontime'}">${isDelay?'딜레이':'정상'}</span></div>
        ${p.note?`<div class="open-note"><i class="ti ti-notes" style="font-size:11px;"></i> ${p.note}</div>`:''}
        <div style="font-size:12px;color:var(--text3);margin-top:2px;">담당: ${p.members||'—'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:12px;">
        <span class="dday ${dd.cls}">${dd.txt}</span>
        <button class="btn sm" onclick="showForm('edit',${p.id})" title="수정"><i class="ti ti-edit"></i></button>
        <button class="btn sm danger" onclick="delProj(${p.id})" title="삭제"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function renderTimeline(){
  if(!projects.length){
    document.getElementById('tl-wrap').innerHTML='<div class="empty-msg">등록된 프로젝트가 없어요</div>';
    document.getElementById('tl-months').innerHTML='';
    return;
  }
  let mn=new Date(TODAY), mx=new Date(TODAY);
  projects.forEach(p=>{
    [p.design,p.pub,p.dev,p.test].forEach(r=>{
      const a=parseD(r[0]),b=parseD(r[1]);
      if(a<mn) mn=new Date(a); if(b>mx) mx=new Date(b);
    });
    const od=parseD(p.open);
    if(od<mn) mn=new Date(od); if(od>mx) mx=new Date(od);
  });
  mn.setDate(mn.getDate()-4); mx.setDate(mx.getDate()+8);
  const TOTAL = Math.max(1, Math.round((mx-mn)/86400000));
  const pct  = s => (Math.round((parseD(s)-mn)/86400000)/TOTAL*100).toFixed(2)+'%';
  const wpct = (s,e) => Math.max(0.5, (Math.round((parseD(e)-parseD(s))/86400000)/TOTAL*100)).toFixed(2)+'%';
  const todayOff = (Math.round((TODAY-mn)/86400000)/TOTAL*100).toFixed(2);

  // 월 헤더
  const mhdr = document.getElementById('tl-months'); mhdr.innerHTML='';
  let cur = new Date(mn.getFullYear(), mn.getMonth(), 1);
  while(cur <= mx){
    const mEnd = new Date(cur.getFullYear(), cur.getMonth()+1, 0);
    const vs = cur<mn?mn:cur, ve = mEnd>mx?mx:mEnd;
    const w = (Math.round((ve-vs)/86400000)+1)/TOTAL*100;
    const d = document.createElement('div');
    d.className='tl-month'; d.style.width=w.toFixed(1)+'%';
    d.textContent = (cur.getMonth()+1)+'월';
    mhdr.appendChild(d);
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }

  document.getElementById('tl-wrap').innerHTML = [...projects]
    .sort((a,b)=>parseD(a.open)-parseD(b.open))
    .map(p=>{
      const isDelay = Math.round((parseD(p.open)-TODAY)/86400000) < 0;
      const openOff = (Math.round((parseD(p.open)-mn)/86400000)/TOTAL*100).toFixed(2);
      return `<div class="tl-row">
        <div class="tl-meta">
          <span style="font-size:13px;font-weight:500;">${p.name}
            <span class="badge ${isDelay?'delay':'ontime'}" style="margin-left:6px;">${isDelay?'딜레이':'정상'}</span>
          </span>
          <span style="font-size:12px;color:var(--text3);">엔딩 ${fmt(parseD(p.test[1]))} → 오픈 ${fmt(parseD(p.open))}</span>
        </div>
        <div class="tl-bar-wrap">
          <div class="tl-bg"></div>
          <div class="tl-seg seg-d" style="left:${pct(p.design[0])};width:${wpct(p.design[0],p.design[1])}">디자인</div>
          <div class="tl-seg seg-p" style="left:${pct(p.pub[0])};width:${wpct(p.pub[0],p.pub[1])}">퍼블</div>
          <div class="tl-seg seg-dev" style="left:${pct(p.dev[0])};width:${wpct(p.dev[0],p.dev[1])}">개발</div>
          <div class="tl-seg seg-t" style="left:${pct(p.test[0])};width:${wpct(p.test[0],p.test[1])}">테스트</div>
          <div class="open-marker" style="left:${openOff}%">
            <span class="end-label">오픈 ${fmt(parseD(p.open))}</span>
          </div>
          <div class="today-line" style="left:${todayOff}%">
            <span class="today-tip">오늘</span>
          </div>
        </div>
      </div>`;
    }).join('');
}

// ── 레드마인 ──
function renderRedmineArea(){
  const area = document.getElementById('redmine-area');
  const waitStatuses = rmConfig.waitStatus.split(',').map(s=>s.trim());
  const filtered = rmFilter==='전체' ? rmIssues : rmIssues.filter(i=>i.status?.name===rmFilter);
  const waitCount = rmIssues.filter(i=>waitStatuses.includes(i.status?.name)).length;
  document.getElementById('rm-count-badge').textContent = `대기 ${waitCount}건`;

  const statuses = [...new Set(['대기','신규','진행','수정완료', ...rmIssues.map(i=>i.status?.name).filter(Boolean)]),'전체'];
  const tabHtml = `<div class="rm-tabs">${[...new Set(statuses)].map(s=>
    `<button class="rm-tab ${rmFilter===s?'active':''}" onclick="setRmFilter('${s}')">${s}</button>`
  ).join('')}</div>`;

  if(!rmFetched){
    area.innerHTML = tabHtml + '<div class="loading-row"><i class="ti ti-loader-2" style="font-size:16px;"></i> 레드마인에서 일감을 불러오는 중...</div>';
    fetchRedmine(false);
    return;
  }
  if(!filtered.length){
    area.innerHTML = `<div class="rm-toolbar">${tabHtml}</div><div class="empty-msg">${rmFilter} 상태 일감이 없어요</div>`;
    return;
  }
  area.innerHTML = `<div class="rm-toolbar">${tabHtml}
    <span style="font-size:13px;color:var(--text2);">${rmFilter} <strong>${filtered.length}</strong>건</span>
  </div>
  <table class="issue-table">
    <thead><tr>
      <th style="width:50px;">번호</th>
      <th>제목</th>
      <th style="width:72px;">상태</th>
      <th style="width:72px;">담당자</th>
      <th style="width:76px;">시작일</th>
      <th style="width:38px;"></th>
    </tr></thead>
    <tbody>${filtered.map(i=>{
      const stCls = 'st-'+(i.status?.name||'default');
      return `<tr>
        <td style="color:var(--text3);font-size:12px;">#${i.id}</td>
        <td title="${i.subject}">${i.subject}</td>
        <td><span class="st-badge ${stCls}">${i.status?.name||'—'}</span></td>
        <td style="font-size:12px;color:var(--text2);">${i.assigned_to?.name||'미배정'}</td>
        <td style="font-size:12px;color:var(--text3);">${i.start_date||'—'}</td>
        <td><button class="btn sm danger" onclick="delIssue(${i.id})" title="삭제"><i class="ti ti-x"></i></button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function setRmFilter(s){ rmFilter=s; renderRedmineArea(); }

async function fetchRedmine(manual){
  if(manual){
    document.getElementById('redmine-area').innerHTML =
      '<div class="loading-row"><i class="ti ti-loader-2"></i> 불러오는 중...</div>';
  }
  if(!rmConfig.apiKey){ rmFetched=true; renderRedmineArea(); return; }
  try{
    const r = await fetch(
      `${rmConfig.url}/projects/${rmConfig.projectId}/issues.json?key=${rmConfig.apiKey}&limit=100&status_id=open`
    );
    if(!r.ok){ rmFetched=true; renderRedmineArea(); return; }
    const data = await r.json();
    const manuals = rmIssues.filter(i=>i._manual);
    rmIssues = [...manuals, ...(data.issues||[])];
    rmFetched = true;
    saveData();
    renderRedmineArea();
    if(manual) showToast('레드마인 일감을 불러왔어요');
  }catch(e){
    rmFetched = true;
    renderRedmineArea();
    if(manual) showToast('연결 실패 — API 설정을 확인해주세요');
  }
}

}

function saveModal(){
  if(modalMode==='add' || modalMode==='edit'){
    const name = document.getElementById('f-name').value.trim();
    const open = document.getElementById('f-open').value;
    if(!name||!open){ alert('프로젝트명과 오픈일은 필수예요.'); return; }
    const g = id => document.getElementById(id)?.value || open;
    const obj = {
      name, open,
      design:[g('f-ds'),g('f-de')], pub:[g('f-ps'),g('f-pe')],
      dev:[g('f-devs'),g('f-deve')], test:[g('f-ts'),g('f-te')],
      members: document.getElementById('f-members').value,
      note: document.getElementById('f-note').value
    };
    if(modalMode==='add'){ obj.id=nextPid++; projects.push(obj); }
    else{ const i=projects.findIndex(x=>x.id===editId); if(i>=0){obj.id=editId;projects[i]=obj;} }
    showToast(modalMode==='add'?'프로젝트를 추가했어요':'프로젝트를 수정했어요');

  } else if(modalMode==='redmine-manual'){
    const subject = document.getElementById('f-rsubject').value.trim();
    if(!subject){ alert('제목을 입력해주세요.'); return; }
    const rid = parseInt(document.getElementById('f-rid').value) || Math.floor(Math.random()*900+1100);
    rmIssues.unshift({
      id: rid, subject,
      status:{name: document.getElementById('f-rstatus').value},
      assigned_to:{name: document.getElementById('f-rassign').value||'미배정'},
      start_date: document.getElementById('f-rdate').value,
      _manual: true
    });
    showToast('일감을 추가했어요');

  } else if(modalMode==='redmine'){
    rmConfig.url    = document.getElementById('f-rmurl').value.trim().replace(/\/$/,'');
    rmConfig.apiKey = document.getElementById('f-rmkey').value.trim();
    rmConfig.projectId = document.getElementById('f-rmproj').value.trim();
    rmConfig.waitStatus = document.getElementById('f-rmwait').value.trim();
    rmFetched = false;
    showToast('API 설정을 저장했어요');
  }

  saveData();
  closeModal();
  renderDash();
  if(modalMode==='redmine') fetchRedmine(false);
}

async function testApi(){
  const url = document.getElementById('f-rmurl').value.trim().replace(/\/$/,'');
  const key = document.getElementById('f-rmkey').value.trim();
  const proj = document.getElementById('f-rmproj').value.trim();
  const msg = document.getElementById('rm-test-msg');
  msg.style.color='var(--text3)'; msg.textContent='연결 확인 중...';
  try{
    const r = await fetch(`${url}/projects/${proj}/issues.json?key=${key}&limit=1`);
    if(r.ok){ msg.style.color='var(--green)'; msg.textContent='✓ 연결 성공! 저장 후 일감이 자동으로 불러와져요.'; }
    else{ msg.style.color='var(--red)'; msg.textContent='✗ '+r.status+' — API Key 또는 프로젝트 ID를 확인해주세요.'; }
  }catch(e){
    msg.style.color='var(--red)';
    msg.textContent='✗ 연결 실패. 사내 PC에서 열어야 내부망에 접속 가능해요.';
  }
}

    document.getElementById('kwUpdateTime').textContent=data.updated?'업데이트 '+data.updated:'';
  }catch{
    kwAllCards=kwGetSampleData();
    document.getElementById('kwUpdateTime').textContent='샘플 데이터';
  }
  kwRenderCards();
}

function kwRenderCards(){
  const grid=document.getElementById('kwCardGrid');
  const filtered=kwCurrentFilter==='all'?kwAllCards:kwAllCards.filter(c=>c.category===kwCurrentFilter);
  const list=[...filtered].sort((a,b)=>{const da=a.publishedAt||a.collectedAt||'',db=b.publishedAt||b.collectedAt||'';return db.localeCompare(da);});
  document.getElementById('kwCardCount').textContent=list.length+'개';
  if(!list.length){grid.innerHTML='<div class="kw-loading-state" style="color:#ccc;">해당 분야의 뉴스가 없어요</div>';return;}
  grid.innerHTML=list.map((card,i)=>{
    const idx=kwAllCards.indexOf(card);
    return '<article class="kw-news-card kw-card-'+card.category+'" style="animation-delay:'+(i*.04)+'s" onclick="kwOpenModal('+idx+')">'
      +'<div class="kw-card-accent"></div>'
      +'<div class="kw-card-body">'
      +'<div class="kw-card-top"><span class="kw-cat-chip kw-chip-'+card.category+'">'+(KW_CAT_LABEL[card.category]||card.category)+'</span>'
      +'<span class="kw-card-date">'+card.date+'</span></div>'
      +'<p class="kw-card-title">'+card.title+'</p>'
      +'<p class="kw-card-summary">'+card.summary+'</p>'
      +'<div class="kw-card-keywords">'+(card.keywords||[]).map(k=>'<span class="kw-kw-tag"># '+k+'</span>').join('')+'</div>'
      +'<div class="kw-card-footer"><span class="kw-card-source">'+card.source+'</span>'
      +'<span class="kw-card-link">자세히 보기 →</span></div></div></article>';
  }).join('');
}

function kwSetFilter(cat,btn){
  kwCurrentFilter=cat;
  document.querySelectorAll('.kw-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  kwRenderCards();
}

function kwOpenModal(idx){
  const card=kwAllCards[idx];
  const col=KW_CAT_COLOR[card.category]||'#888';
  document.getElementById('kwModalAccent').style.background=col;
  document.getElementById('kwModalSourceDot').style.background=col;
  document.getElementById('kwModalChip').textContent=KW_CAT_LABEL[card.category]||card.category;
  document.getElementById('kwModalChip').className='kw-cat-chip kw-chip-'+card.category;
  document.getElementById('kwModalDate').textContent=card.date;
  document.getElementById('kwModalTitle').textContent=card.title;
  document.getElementById('kwModalSource').textContent=card.source;
  document.getElementById('kwModalLink').href=card.url||'#';
  document.getElementById('kwModalSummary').textContent=card.summary||'';
  const full=card.summary_full||card.summary||'';
  const sentences=full.split(/(?<=[.!?])\s+/).filter(s=>s.trim().length>5);
  document.getElementById('kwModalPoints').innerHTML=sentences.map(s=>
    '<li><span class="kw-modal-point-dot" style="background:'+col+';opacity:.5;"></span><span>'+s.trim()+'</span></li>'
  ).join('')||'<li><span class="kw-modal-point-dot" style="background:'+col+';opacity:.5;"></span><span>'+full+'</span></li>';
  document.getElementById('kwModalKeywords').innerHTML=(card.keywords||[]).map(k=>'<span class="kw-modal-kw-tag"># '+k+'</span>').join('');
  window._kwCurrentUrl=card.url||location.href;
  document.getElementById('kwModalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function kwCloseModal(e){if(e.target===document.getElementById('kwModalOverlay'))kwCloseModalDirect();}
function kwCloseModalDirect(){document.getElementById('kwModalOverlay').classList.remove('open');document.body.style.overflow='';}
function kwCopyLink(){
  navigator.clipboard.writeText(window._kwCurrentUrl||location.href).then(()=>{
    const btn=document.querySelector('.kw-modal-share-btn');
    const orig=btn.textContent; btn.textContent='✅ 복사됐어요!';
    setTimeout(()=>btn.textContent=orig,2000);
  });
}
